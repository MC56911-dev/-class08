<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Underwater 海底页面</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #ffffff;
        background: #041a2f;
      }
      #sea {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .panel {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 2;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(6, 25, 44, 0.65);
        border: 1px solid rgba(160, 220, 255, 0.3);
        backdrop-filter: blur(4px);
      }
      .panel h1 {
        margin: 0 0 6px;
        font-size: 16px;
      }
      .panel p {
        margin: 0;
        font-size: 13px;
        opacity: 0.9;
      }
      .home-link {
        position: fixed;
        right: 16px;
        top: 16px;
        z-index: 2;
        color: #d7f6ff;
        text-decoration: none;
        background: rgba(6, 25, 44, 0.65);
        border: 1px solid rgba(160, 220, 255, 0.3);
        padding: 10px 12px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <canvas id="sea"></canvas>

    <div class="panel">
      <h1>海底世界</h1>
      <p>移动鼠标可轻微影响鱼群方向。</p>
    </div>

    <a class="home-link" href="./index.html">返回入口</a>

    <script>
      (function () {
        "use strict";

        var canvas = document.getElementById("sea");
        var ctx = canvas.getContext("2d");
        var fish = [];
        var bubbles = [];
        var pointerX = 0.5;
        var pointerY = 0.5;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function random(min, max) {
          return min + Math.random() * (max - min);
        }

        function createFish(count) {
          fish = [];
          for (var i = 0; i < count; i++) {
            fish.push({
              x: random(0, canvas.width),
              y: random(30, canvas.height - 30),
              vx: random(0.8, 2.2),
              vy: random(-0.35, 0.35),
              size: random(8, 18),
              hue: random(165, 215)
            });
          }
        }

        function createBubble() {
          bubbles.push({
            x: random(0, canvas.width),
            y: canvas.height + 20,
            r: random(1.5, 5),
            vy: random(0.6, 1.8),
            alpha: random(0.25, 0.75)
          });
        }

        function drawBackground() {
          var g = ctx.createLinearGradient(0, 0, 0, canvas.height);
          g.addColorStop(0, "#0a3358");
          g.addColorStop(0.5, "#084065");
          g.addColorStop(1, "#03243f");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "rgba(120, 220, 255, 0.08)";
          for (var i = 0; i < 6; i++) {
            var y = (canvas.height / 6) * i + 15 * Math.sin(Date.now() * 0.0007 + i);
            ctx.fillRect(0, y, canvas.width, 6);
          }
        }

        function drawFish(f) {
          ctx.save();
          ctx.translate(f.x, f.y);
          ctx.scale(f.vx >= 0 ? 1 : -1, 1);
          ctx.fillStyle = "hsl(" + f.hue + ", 80%, 62%)";
          ctx.beginPath();
          ctx.ellipse(0, 0, f.size * 1.2, f.size * 0.7, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(-f.size * 1.2, 0);
          ctx.lineTo(-f.size * 1.9, -f.size * 0.5);
          ctx.lineTo(-f.size * 1.9, f.size * 0.5);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(f.size * 0.5, -f.size * 0.15, Math.max(1.2, f.size * 0.12), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function tick() {
          drawBackground();

          if (Math.random() < 0.6) {
            createBubble();
          }

          for (var i = bubbles.length - 1; i >= 0; i--) {
            var b = bubbles[i];
            b.y -= b.vy;
            if (b.y < -20) {
              bubbles.splice(i, 1);
              continue;
            }
            ctx.strokeStyle = "rgba(210,240,255," + b.alpha + ")";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.stroke();
          }

          var targetX = pointerX * canvas.width;
          var targetY = pointerY * canvas.height;
          for (var j = 0; j < fish.length; j++) {
            var f = fish[j];
            var dx = targetX - f.x;
            var dy = targetY - f.y;
            var influence = Math.max(0, 1 - Math.hypot(dx, dy) / 260);

            f.vx += 0.002 + 0.01 * influence * (dx > 0 ? 1 : -1);
            f.vy += 0.002 * Math.sin(Date.now() * 0.002 + j) + 0.01 * influence * (dy > 0 ? 1 : -1);

            f.vx = Math.max(-2.5, Math.min(2.5, f.vx));
            f.vy = Math.max(-1, Math.min(1, f.vy));

            f.x += f.vx;
            f.y += f.vy;

            if (f.x > canvas.width + 40) f.x = -40;
            if (f.x < -40) f.x = canvas.width + 40;
            if (f.y > canvas.height - 20 || f.y < 20) f.vy *= -1;

            drawFish(f);
          }

          requestAnimationFrame(tick);
        }

        window.addEventListener("mousemove", function (e) {
          pointerX = e.clientX / window.innerWidth;
          pointerY = e.clientY / window.innerHeight;
        });

        window.addEventListener("resize", function () {
          resize();
          createFish(16);
        });

        resize();
        createFish(16);
        tick();
      })();
    </script>
  </body>
</html>
