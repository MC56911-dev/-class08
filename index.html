<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class 08 作品入口</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f1d3a 0%, #1b355f 50%, #215f7a 100%);
        color: #ffffff;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(760px, 100%);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 16px;
        padding: 28px;
        backdrop-filter: blur(6px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 18px;
        opacity: 0.9;
      }
      .links {
        display: grid;
        gap: 12px;
      }
      a {
        display: block;
        text-decoration: none;
        color: #0b2142;
        background: #ffffff;
        border-radius: 12px;
        padding: 14px 16px;
        font-weight: 700;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      .tip {
        margin-top: 14px;
        font-size: 13px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Class 08 网页入口</h1>
      <p>点击下面任意链接打开对应页面：</p>
      <div class="links">
        <a href="https://mc56911-dev.github.io/-class08/three-modes.html" target="_blank" rel="noopener noreferrer">1) Three Modes 互动网页（直达链接）</a>
        <a href="https://mc56911-dev.github.io/-class08/underwater.html" target="_blank" rel="noopener noreferrer">2) Underwater 海底网页（直达链接）</a>
      </div>
      <div class="tip">提示：这两个页面都已放在同一仓库中，可直接访问。</div>
    </main>
  </body>
</html>
